name: Nightly

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  test:
    name: Julia nightly - ${{ matrix.os }} - ${{ matrix.nthreads }} threads - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        nthreads:
          - 1
          - 2
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: nightly
      - uses: actions/cache@v5
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-nightly-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-nightly-${{ env.cache-name }}-
            ${{ runner.os }}-nightly-
            ${{ runner.os }}-
      - name: Install source build toolchain (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config
      - name: Install source build toolchain (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install autoconf automake libtool pkg-config
      - name: Ensure General registry
        shell: julia --project=. {0}
        run: |
          using Pkg
          registries = Pkg.Registry.reachable_registries()
          any(registry -> registry.name == "General", registries) || Pkg.Registry.add("General")
      - name: Instantiate package
        env:
          JULIA_PKG_PRECOMPILE_AUTO: "0"
        run: |
          julia --project="$(mktemp -d)" -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate(); Pkg.build("WendaoCodeParser")'
      - name: Run package tests
        env:
          JULIA_NUM_THREADS: ${{ matrix.nthreads }}
          JULIA_PKG_PRECOMPILE_AUTO: "0"
        run: |
          chmod +x ./scripts/test_wendao_code_parser.sh
          ./scripts/test_wendao_code_parser.sh
