name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
      - "!dependabot/**"
    tags:
      - "**"

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.nthreads }} threads - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        version:
          - "1.12"
          - "pre"
        os:
          - ubuntu-latest
          - macos-latest
        nthreads:
          - 1
          - 2
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: actions/cache@v5
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-test-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-test-${{ env.cache-name }}-
            ${{ runner.os }}-test-
            ${{ runner.os }}-
      - name: Install source build toolchain (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config
      - name: Install source build toolchain (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install autoconf automake libtool pkg-config
      - name: Bootstrap registries
        shell: julia --project=. {0}
        run: |
          using Pkg

          function ensure_registry(name::String; spec=nothing)
              registries = Pkg.Registry.reachable_registries()
              any(registry -> registry.name == name, registries) && return
              if isnothing(spec)
                  Pkg.Registry.add(name)
              else
                  Pkg.Registry.add(spec)
              end
          end

          ensure_registry("General")
          ensure_registry(
              "OpenModelica";
              spec=Pkg.RegistrySpec(url="https://github.com/JKRT/OpenModelicaRegistry.git"),
          )
      - name: Bootstrap inherited WendaoArrow direct sources
        shell: julia --project=. {0}
        run: |
          ENV["JULIA_PKG_PRECOMPILE_AUTO"] = "0"

          using Downloads
          using Pkg
          using TOML

          function raw_project_url(url::String, rev::String)
              repo_url = replace(url, r"\.git$" => "")
              raw_base = replace(repo_url, "https://github.com/" => "https://raw.githubusercontent.com/")
              return string(raw_base, "/", rev, "/Project.toml")
          end

          function package_spec_from_source(name::String, source::Dict{String,Any})
              if haskey(source, "subdir")
                  return PackageSpec(
                      name = name,
                      url = source["url"],
                      rev = source["rev"],
                      subdir = source["subdir"],
                  )
              end
              return PackageSpec(name = name, url = source["url"], rev = source["rev"])
          end

          project = TOML.parsefile(Base.active_project())
          wendaoarrow_spec = project["sources"]["WendaoArrow"]
          wendaoarrow_project = TOML.parsefile(
              Downloads.download(
                  raw_project_url(wendaoarrow_spec["url"], wendaoarrow_spec["rev"]),
              ),
          )

          inherited_source_specs = PackageSpec[]
          for dependency_name in sort!(collect(keys(get(wendaoarrow_project, "deps", Dict()))))
              sources = get(wendaoarrow_project, "sources", Dict())
              haskey(sources, dependency_name) || continue
              push!(
                  inherited_source_specs,
                  package_spec_from_source(dependency_name, sources[dependency_name]),
              )
          end

          isempty(inherited_source_specs) || Pkg.add(inherited_source_specs)

          Pkg.resolve()
      - uses: julia-actions/julia-buildpkg@v1.6
        with:
          project: .
      - uses: julia-actions/julia-runtest@v1
        env:
          JULIA_NUM_THREADS: ${{ matrix.nthreads }}
        with:
          project: .
